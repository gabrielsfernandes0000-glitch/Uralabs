<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bl-bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#2a1f10"/>
      <stop offset="50%" stop-color="#17130b"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </radialGradient>
    <radialGradient id="bl-ray-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#fcd34d" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fcd34d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bl-ray-beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde68a" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#fcd34d" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#fcd34d" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bl-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3c7" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#d4a256" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="bl-left" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b8853a" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#5a4020" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="bl-right" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d4a256" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#7c5a26" stop-opacity="0.18"/>
    </linearGradient>
    <radialGradient id="bl-floor" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fcd34d" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#000000" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="bl-blur-lg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="bl-blur-sm" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bl-bg)"/>

  <!-- Light rays (beams saindo da caixa) -->
  <g transform="translate(400 260)" opacity="0.5">
    <!-- Vertical beam -->
    <path d="M -40 0 L -90 -240 L 90 -240 L 40 0 Z" fill="url(#bl-ray-beam)"/>
    <!-- Left beam -->
    <path d="M -30 0 L -200 -180 L -170 -200 L -10 0 Z" fill="url(#bl-ray-beam)" opacity="0.7"/>
    <!-- Right beam -->
    <path d="M 30 0 L 200 -180 L 170 -200 L 10 0 Z" fill="url(#bl-ray-beam)" opacity="0.7"/>
    <!-- Diagonal thin beams -->
    <path d="M -20 0 L -130 -230 L -110 -240 L -8 0 Z" fill="url(#bl-ray-beam)" opacity="0.45"/>
    <path d="M 20 0 L 130 -230 L 110 -240 L 8 0 Z" fill="url(#bl-ray-beam)" opacity="0.45"/>
  </g>

  <!-- Central intense glow -->
  <ellipse cx="400" cy="260" rx="170" ry="120" fill="url(#bl-ray-core)" filter="url(#bl-blur-lg)"/>

  <!-- Floor shadow with warm tint -->
  <ellipse cx="400" cy="455" rx="200" ry="34" fill="url(#bl-floor)"/>

  <!-- Box body (open, gold) -->
  <g transform="translate(400 325)">
    <path d="M -145 -25 L 0 50 L 0 140 L -145 65 Z"
          fill="url(#bl-left)" stroke="#fcd34d" stroke-opacity="0.55" stroke-width="1.8"/>
    <path d="M 145 -25 L 0 50 L 0 140 L 145 65 Z"
          fill="url(#bl-right)" stroke="#fcd34d" stroke-opacity="0.65" stroke-width="1.8"/>
    <!-- Open top rim -->
    <path d="M 0 -25 L 145 -25 L 0 50 L -145 -25 Z"
          fill="#1a120a" stroke="#fcd34d" stroke-opacity="0.75" stroke-width="2"/>
    <!-- Inner glow core visible -->
    <ellipse cx="0" cy="-15" rx="128" ry="32" fill="#fef3c7" opacity="0.6" filter="url(#bl-blur-sm)"/>
    <ellipse cx="0" cy="-15" rx="80" ry="18" fill="#ffffff" opacity="0.9" filter="url(#bl-blur-sm)"/>
  </g>

  <!-- Tampa flutuando, rotacionada dramaticamente -->
  <g transform="translate(400 145) rotate(-8)">
    <path d="M 0 -48 L 150 0 L 0 48 L -150 0 Z"
          fill="url(#bl-top)" stroke="#fcd34d" stroke-opacity="0.85" stroke-width="2"/>
    <path d="M -150 0 L 0 48 L 150 0 L 0 8 Z"
          fill="#fcd34d" fill-opacity="0.12"/>
    <!-- Highlights -->
    <path d="M 0 -48 L 150 0" stroke="#fef3c7" stroke-opacity="0.95" stroke-width="2.5" fill="none"/>
    <path d="M 0 -48 L -150 0" stroke="#fef3c7" stroke-opacity="0.7" stroke-width="2" fill="none"/>
    <!-- Gem no topo -->
    <path d="M 0 -2 L 8 -12 L 0 -22 L -8 -12 Z" fill="#fef3c7"/>
    <path d="M 0 -2 L 8 -12 L 0 -12 Z" fill="#ffffff"/>
  </g>

  <!-- Sparkles dourados -->
  <g fill="#fde68a">
    <circle cx="180" cy="180" r="2" opacity="0.85"/>
    <circle cx="640" cy="160" r="1.8" opacity="0.8"/>
    <circle cx="140" cy="340" r="1.5" opacity="0.65"/>
    <circle cx="680" cy="360" r="2.2" opacity="0.9"/>
    <circle cx="240" cy="100" r="1.3" opacity="0.7"/>
    <circle cx="580" cy="90" r="1.5" opacity="0.75"/>
    <circle cx="380" cy="60" r="2" opacity="0.9"/>
    <!-- Star shapes -->
    <path d="M 210 230 L 212 238 L 220 240 L 212 242 L 210 250 L 208 242 L 200 240 L 208 238 Z" opacity="0.75"/>
    <path d="M 605 255 L 607 263 L 615 265 L 607 267 L 605 275 L 603 267 L 595 265 L 603 263 Z" opacity="0.7"/>
  </g>

  <!-- Label -->
  <text x="400" y="510" text-anchor="middle" fill="#fde68a" fill-opacity="0.95"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="30" font-weight="600" letter-spacing="3">Lendária</text>
  <text x="400" y="542" text-anchor="middle" fill="#fcd34d" fill-opacity="0.55"
        font-family="system-ui, sans-serif"
        font-size="12" letter-spacing="2">ÉDITIONS LIMITADAS</text>
</svg>
