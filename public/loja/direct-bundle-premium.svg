<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg-bund-p" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1a1a1d"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg-bund-p)"/>

  <!-- 5 cubos empilhados: 2 atrás, 2 meio, 1 frente -->
  <g transform="translate(250 220)" opacity="0.45">
    <path d="M 0 -38 L 45 -15 L 0 8 L -45 -15 Z" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.3"/>
    <path d="M -45 -15 L 0 8 L 0 55 L -45 32 Z" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.3"/>
    <path d="M 45 -15 L 0 8 L 0 55 L 45 32 Z" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.3"/>
  </g>
  <g transform="translate(550 220)" opacity="0.45">
    <path d="M 0 -38 L 45 -15 L 0 8 L -45 -15 Z" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.3"/>
    <path d="M -45 -15 L 0 8 L 0 55 L -45 32 Z" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.3"/>
    <path d="M 45 -15 L 0 8 L 0 55 L 45 32 Z" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.3"/>
  </g>

  <g transform="translate(320 275)" opacity="0.7">
    <path d="M 0 -45 L 55 -18 L 0 10 L -55 -18 Z" fill="#ffffff" fill-opacity="0.14" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1.5"/>
    <path d="M -55 -18 L 0 10 L 0 65 L -55 37 Z" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1.5"/>
    <path d="M 55 -18 L 0 10 L 0 65 L 55 37 Z" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.34" stroke-width="1.5"/>
  </g>
  <g transform="translate(480 275)" opacity="0.7">
    <path d="M 0 -45 L 55 -18 L 0 10 L -55 -18 Z" fill="#ffffff" fill-opacity="0.14" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1.5"/>
    <path d="M -55 -18 L 0 10 L 0 65 L -55 37 Z" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1.5"/>
    <path d="M 55 -18 L 0 10 L 0 65 L 55 37 Z" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.34" stroke-width="1.5"/>
  </g>

  <!-- Cubo frente maior -->
  <g transform="translate(400 310)">
    <path d="M 0 -55 L 70 -20 L 0 15 L -70 -20 Z" fill="#ffffff" fill-opacity="0.22" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.8"/>
    <path d="M -70 -20 L 0 15 L 0 80 L -70 45 Z" fill="#ffffff" fill-opacity="0.09" stroke="#ffffff" stroke-opacity="0.38" stroke-width="1.8"/>
    <path d="M 70 -20 L 0 15 L 0 80 L 70 45 Z" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-opacity="0.45" stroke-width="1.8"/>
  </g>

  <!-- Ticket badge -->
  <g transform="translate(590 160)">
    <rect x="-30" y="-18" width="60" height="36" rx="6" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.3"/>
    <text x="0" y="5" text-anchor="middle" fill="#ffffff" fill-opacity="0.9"
          font-family="system-ui, sans-serif"
          font-size="14" font-weight="700" letter-spacing="1">-10%</text>
  </g>

  <text x="400" y="460" text-anchor="middle" fill="#ffffff"
        font-family="system-ui, sans-serif"
        font-size="32" font-weight="700" letter-spacing="3">BUNDLE PREMIUM</text>
  <text x="400" y="495" text-anchor="middle" fill="#ffffff" fill-opacity="0.5"
        font-family="system-ui, sans-serif"
        font-size="13" letter-spacing="3">5 CAIXAS + CUPOM ELITE</text>
  <text x="400" y="538" text-anchor="middle" fill="#ffffff" fill-opacity="0.35"
        font-family="system-ui, sans-serif"
        font-size="12" font-weight="500" letter-spacing="2">20% OFF</text>
