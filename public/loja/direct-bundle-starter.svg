<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg-bund-s" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1a1a1d"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg-bund-s)"/>

  <!-- 3 cubos empilhados + booster -->
  <!-- Cubo trás esquerda -->
  <g transform="translate(305 230)" opacity="0.55">
    <path d="M 0 -45 L 55 -18 L 0 10 L -55 -18 Z" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1.5"/>
    <path d="M -55 -18 L 0 10 L 0 65 L -55 37 Z" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5"/>
    <path d="M 55 -18 L 0 10 L 0 65 L 55 37 Z" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.24" stroke-width="1.5"/>
  </g>

  <!-- Cubo trás direita -->
  <g transform="translate(495 230)" opacity="0.55">
    <path d="M 0 -45 L 55 -18 L 0 10 L -55 -18 Z" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1.5"/>
    <path d="M -55 -18 L 0 10 L 0 65 L -55 37 Z" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5"/>
    <path d="M 55 -18 L 0 10 L 0 65 L 55 37 Z" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.24" stroke-width="1.5"/>
  </g>

  <!-- Cubo frente (principal) -->
  <g transform="translate(400 290)">
    <path d="M 0 -65 L 80 -25 L 0 15 L -80 -25 Z" fill="#ffffff" fill-opacity="0.2" stroke="#ffffff" stroke-opacity="0.5" stroke-width="1.8"/>
    <path d="M -80 -25 L 0 15 L 0 95 L -80 55 Z" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.8"/>
    <path d="M 80 -25 L 0 15 L 0 95 L 80 55 Z" fill="#ffffff" fill-opacity="0.14" stroke="#ffffff" stroke-opacity="0.42" stroke-width="1.8"/>
  </g>

  <!-- Lightning badge -->
  <g transform="translate(560 160)">
    <circle r="28" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.5"/>
    <path d="M -6 -14 L 7 -14 L 2 -2 L 12 -2 L -4 16 L 1 2 L -9 2 Z" fill="#ffffff" fill-opacity="0.85"/>
  </g>

  <text x="400" y="450" text-anchor="middle" fill="#ffffff"
