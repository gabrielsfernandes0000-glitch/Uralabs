<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg-streak" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1a1411"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </radialGradient>
    <radialGradient id="flame-glow" cx="50%" cy="60%" r="45%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flame-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdba74"/>
      <stop offset="0.5" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="flame-inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#fdba74"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg-streak)"/>
  <rect width="800" height="600" fill="url(#flame-glow)"/>

  <!-- Chama outline -->
  <g transform="translate(400 265)">
    <path d="M 0 -110 C 40 -70 65 -30 65 20 C 65 75 25 115 0 115 C -25 115 -65 75 -65 20 C -65 -20 -35 -40 -25 -70 C -20 -45 -5 -30 5 -50 C 0 -75 -5 -95 0 -110 Z"
          fill="url(#flame-body)" fill-opacity="0.85"/>
    <!-- Inner flame -->
    <path d="M 0 -50 C 25 -20 35 5 35 30 C 35 60 15 85 0 85 C -15 85 -35 60 -35 30 C -35 5 -20 -10 -12 -25 C -8 -10 0 -5 5 -20 C 0 -35 -2 -45 0 -50 Z"
          fill="url(#flame-inner)" fill-opacity="0.9"/>
  </g>

  <text x="400" y="440" text-anchor="middle" fill="#ffffff" fill-opacity="0.95"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="42" font-weight="700" letter-spacing="4">STREAK SAVER</text>

  <text x="400" y="515" text-anchor="middle" fill="#fb923c" fill-opacity="0.6"
        font-family="system-ui, sans-serif"
        font-size="13" letter-spacing="3">PROTEGE 1 DIA PERDIDO</text>
</svg>
